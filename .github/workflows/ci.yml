name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx nx format:check --all

      - name: Typecheck
        run: npx nx run-many -t typecheck --all

      - name: Lint
        run: npx nx run-many -t lint --all

      - name: Test
        run: npx nx run-many -t test --all --skip-nx-cache -- --coverage

      - name: Mulch record interactive script (smoke)
        run: npm run test:mulch-record-interactive

      - name: Fix coverage report paths
        run: |
          # lcov SF: paths are relative to each package dir (e.g. src/utils.ts).
          # Codecov resolves them from the repo root, so prefix with the package path.
          sed -i 's|^SF:src/|SF:packages/runtime/src/|g' packages/runtime/test-output/jest/coverage/lcov.info || true
          sed -i 's|^SF:src/|SF:packages/cli/src/|g' packages/cli/test-output/jest/coverage/lcov.info || true
          sed -i 's|^SF:src/|SF:packages/agent-plugin-beads/src/|g' packages/agent-plugin-beads/test-output/jest/coverage/lcov.info || true
          sed -i 's|^SF:src/|SF:packages/agent-plugin-mulch/src/|g' packages/agent-plugin-mulch/test-output/jest/coverage/lcov.info || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jwill9999/conscius
          files: packages/runtime/test-output/jest/coverage/lcov.info,packages/cli/test-output/jest/coverage/lcov.info,packages/agent-plugin-beads/test-output/jest/coverage/lcov.info,packages/agent-plugin-mulch/test-output/jest/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Build
        run: npx nx run-many -t build --all

      - run: npx nx fix-ci
        if: always()
